<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">

    <!-- Circles' head scripts [REQUIRED] -->
    <circles-start-scripts/>
    <!-- Physics script goes after the Circles' head scripts [IMPORTANT]-->
    <script src="/global/js/libs/aframe-physics-system.min.js"></script>

  </head>

  <body>
    <!-- a-scene with 'circles-properties' component [REQUIRED] -->
    <a-scene circles_properties >
      <!-- assets -->
      <a-assets timeout="10000">

        <!-- We'll need to load in screenshots of the different experiments -->
        <!-- Right now, I'm using the campfire as placeholder -->
        <img id='campfire360' src='/global/assets/textures/equirectangular/Campfire_360.jpg' crossorigin="anonymous">

        <!-- Circles' built-in assets [REQUIRED] -->
        <circles-assets/>
      </a-assets>

      <!-- Circles' built-in avatar [REQUIRED] -->
      <circles-avatar/>

      <!-- portals -->
      <a-entity id="campfireLink" class="interactive" position="0 2 -4" rotation="0 180 0" scale="1.4 1.4 1.4" visible="true" shadow="receive:true; cast:true;"
                circles-interactive-object="neutral_scale:1.1; hovered_scale:1.13; clicked_scale:1.13;"
                geometry="primitive:sphere; radius:0.6; segmentsWidth:10; segmentsHeight:10;"
                material="src:#campfire360; metalness:0.1; roughness:0.25; flatShading:true; emissive:#FFF; emissiveIntensity:0.02;"
                link="href:/rooms/explore/world/KIN_FreeFall; visualAspectEnabled:false;">
                <a-entity text="value:Free Fall experiment; align:center; width:5.0;" rotation="0 90 0" position="0 1 0"></a-entity>
      </a-entity>

      <!-- Floor -->
      <a-plane position="0 0 -4" rotation="-90 0 0" width="100" height="100" color="#7BC8A4" static-body circles-shadow></a-plane>

    </a-scene>

    <!-- Circles' end scripts [REQUIRED] -->
    <circles-end-scripts/>
  </body>
</html>
