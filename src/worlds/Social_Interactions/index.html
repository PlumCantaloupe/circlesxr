<html>
<head>
  <meta charset="utf-8">
  <!-- Circles' head scripts [REQUIRED] -->
  <circles-start-scripts/>
    <script src="js/Manager.js"></script>
    <script src="js/Interactions_One/HoldObject.js"></script>
    <script src="js/Interactions_One/PlacementSpots.js"></script>
    <script src="js/Interactions_One/interactEvent.js"></script>
    <script src="js/Interactions_Two/Dial.js"></script>
    <script src="js/Interactions_Two/InteractDialEvents.js"></script>
    <script src="js/Interactions_Two/InteractEventsCombo.js"></script>
    <script src="js/Interactions_Three/HoldObjectPicture.js"></script>

<body>
  <!-- this is used to create our enter UI that creates a 2D overlay to capture a user gesture for sound/mic access etc. -->
  <circles-start-ui/>

  <!-- a-scene with 'circles-properties' component [REQUIRED] -->
  <a-scene circles_scene_properties>
    <a-assets>
      <img id='skyMap' src='assets\texture\2148895316.jpg' crossorigin="anonymous">
      <!-- Circles' built-in assets [REQUIRED] -->
      <circles-assets/>
    </a-assets>

    <!-- Circles' built-in manager and avatar [REQUIRED] -->
    <circles-manager-avatar/>

    <!-- start your code: put your A-frame, Circles XR, and custom components here -->


    <!-- socket connector -->
    <a-entity gamemanager id="gameManager"></a-entity>
    

    <!--INTERACTION ONE OBJECTS-->
          <!-- Table-->
          <a-entity 
                      geometry="primitive: box; width: 10; height: 10; depth: 1"
                      material="color:rgb(64, 64, 64); roughness:0.2; side: double"
                      position="10 -5 0" rotation="0 90 0" scale="1.5 1 3"></a-entity>

          <!-- screen-->
          <a-entity 
                    geometry="primitive: plane; width: 5; height: 3; depth: 1"
                    material="color:rgb(0, 0, 0); roughness:0.2; side: double"
                    position="10 5 0" rotation="0 90 0" scale="1 1 1">
                    <a-entity id="ScreenTextPlacementSpot" text="baseline:top; value: Missing Objects; color:rgb(255, 0, 0); width: 10;" 
                      position="-3.3 0.2 -0.1" scale="1 1 1" rotation ="0 180 0"></a-entity>
                    </a-entity> 

          <!-- button-->
          <a-entity 
                      geometry="primitive: box; width: 0.5; height: 0.5; depth: 0.5"
                      material="color:rgb(32, 32, 32); roughness:0.2; side: double"
                      position="9.5 0.05 1" rotation="0 90 0" scale="1 1 1"></a-entity>

                      geometry="primitive: box; width: 0.5; height: 0.5; depth: 0.5"
                      material="color:rgb(255, 0, 0); roughness:0.2; side: double"
                      position="9.5 0.2 1" rotation="0 90 0" scale="0.8 0.8 0.8"
                      circles-interactive-object="type:highlight"></a-entity>

          <!-- PlaceableAreas-->

            </a-entity>
          </a-entity>

          <!-- button-->
          <a-entity 
                      geometry="primitive: box; width: 0.5; height: 0.5; depth: 0.5"
                      material="color:rgb(32, 32, 32); roughness:0.2; side: double"
                      position="-4 0 16.63" rotation="0 90 0" scale="1 1 1">

            <a-entity checkcombobutton id="buttonCB"
                      geometry="primitive: box; width: 0.5; height: 0.5; depth: 0.5"

                      position="0 0.15 0" rotation="0 90 0" scale="0.8 0.8 0.8"

                      position="-2 1 16.63" rotation="0 90 0" scale="1 1 1"></a-entity>

    <!--END OF INTERACTION TWO OBJECTS-->
    
    <!--INTERACTION THREE OBJECTS-->
          <!-- Table-->
          <a-entity 
                    geometry="primitive: box; width: 10; height: 10; depth: 1"
                    material="color:rgb(64, 64, 64); roughness:0.2; side: double"
                    position="-15 -5 0" rotation="0 90 0" scale="1.5 1 3"></a-entity>
          
          <!-- PictureFrame-->
          <a-entity 
                    geometry="primitive: plane; width: 3; height: 3; depth: 1"
                    material="color:rgb(0, 0, 0); roughness:0.2; side: double"
                    position="-15 2 -5" rotation="0 90 0" scale="1 1 1">

                    <a-entity picturespots id="picturespots_red" geometry="primitive: box; width: 1; height: 1; depth: 1" circles-interactive-object="type:highlight"
